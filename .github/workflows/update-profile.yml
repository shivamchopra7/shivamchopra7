name: Update profile card

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches: [main]
    paths:
      - "profile-config.json"
      - "assets/avatar-ascii.txt"
      - "scripts/update_profile.py"
      - ".github/workflows/update-profile.yml"

permissions:
  contents: write

concurrency:
  group: update-profile-card
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependency
        run: python -m pip install --requirement requirements.txt

      - name: Generate profile cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: shivamchopra7
        run: python scripts/update_profile.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-dark.svg assets/profile-light.svg assets/stats.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh GitHub profile stats"
          git push
